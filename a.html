<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Full Screen Story</title>
    <style>
        /* إزالة الهوامش الافتراضية للمتصفح */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* لمنع التمرير */
            background-color: #000; /* خلفية سوداء في حال كانت الصورة تحمل أبعاداً مختلفة قليلاً */
        }

        .story-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .story-container img {
            width: 100%;
            height: 100%;
            /* الخاصية الأهم: تجعل الصورة تغطي المساحة بالكامل مع الحفاظ على أبعادها دون تمطيط */
            object-fit: cover; 
            /* لضمان توزيعه بشكل صحيح على شاشات الآيفون الطويلة */
            object-position: center;
        }
    </style>
</head>
<body>

    <div class="story-container">
        <img src="img/test.png" alt="Story Image">
    </div>

</body>
</html>
